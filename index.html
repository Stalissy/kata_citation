<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercice</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="chaos-universal -theme">
    <header>
      <select id="theme-select">
        <option value="chaos-universal">Chaos universel</option>
        <option value="nurgle">Nurgle</option>
        <option value="khorne">Khorne</option>
        <option value="slaneesh">Slaanesh</option>
        <option value="tzeentch">Tzeentch</option>
      </select>
      <h1>Mes citation</h1>
      <h2>Gestionnaire de citation en ligne</h2>
      <h3 id="count">0 citation</h3>
    </header>
    <main>
      <form action="" id="form-citation">
        <label for="citation" id="citation-label">Citation</label>
        <input
          type="text"
          id="citation"
          name="citation"
          placeholder="Entrer votre citation"
        />
        <label for="author" id="author-label">Auteur</label>
        <input
          type="text"
          id="author"
          name="author"
          placeholder="Entrer le nom de l'auteur"
        />
        <button type="submit" id="btn-submit">Validée</button>
      </form>
      <div id="quote-list"></div>
    </main>

    <script src="main.js"></script>
    <script src="chooseTheme.js"></script>
  </body>
</html>
