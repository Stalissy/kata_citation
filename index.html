<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercice</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <h1>Mes citation</h1>
      <h2>Gestionnaire de citation en ligne</h2>
      <h3>0 citation</h3>
      <hr />
    </header>
    <main>
      <form action="" id="form-citation">
        <label for="citation" id="citation-label">Citation</label>
        <input
          type="text"
          id="citation"
          name="citation"
          placeholder="Entrer votre citation"
        />
        <label for="author" id="author-label">Auteur</label>
        <input
          type="text"
          id="author"
          name="author"
          placeholder="Entrer le nom de l'auteur"
        />
        <button type="submit">Validée</button>
      </form>
      <hr />
      <div id="quote-list">
        <div class="quote">
          <p class="text">On ne naît pas femme, on le devient.</p>
          <p class="author">Simone de Beauvoir</p>
          <hr />
        </div>
      </div>
    </main>

    <script src="main.js"></script>
  </body>
</html>
